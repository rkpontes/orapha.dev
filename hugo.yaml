# Hugo configuration file
# Dev mode: hugo server --renderSegments recent
# Only renders 2025+ content for fast preview (~70 posts instead of ~750)
segments:
  recent:
    includes:
      - kind: "{home,section,taxonomy,term}"
      - path: "{/2025/**,/2026/**,/2027/**,/about,/archives}"

title: orapha.dev
enableEmoji: true
languageCode: "pt-BR"
defaultContentLanguage: "pt-br"
baseURL: "https://www.orapha.dev/"

languages:
  pt-br:
    languageName: "Portugues"
    weight: 1

outputs:
  home: [HTML, RSS]

services:
  disqus:
    shortname: oraphadev

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Theme
      weight: 0
      params:
        type: theme-toggle
    - name: About
      pageRef: /about
      weight: 1
    - name: GitHub ↗
      url: "https://github.com/rkpontes"
      weight: 2
      params:
        icon: github
    - name: Search
      weight: 3
      params:
        type: search
    - name: RSS
      weight: 4
      url: "/index.xml"
      params:
        icon: rss
  sidebar:
    - name: GitHub
      weight: 1
      url: "https://github.com/rkpontes"
      params:
        icon: github
    - name: Twitter
      weight: 1
      url: "#"
      params:
        icon: x-twitter
    - name: Instagram
      weight: 1
      url: "https://instagram.com/raphaelkennedy"
      params:
        icon: instagram

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"

  # Keep default youtube shortcode as configurable
  youtubeDefaults:
    iframeAllowList: "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy: "no-referrer"
    iframeStyle: "border:0; width:100%; aspect-ratio:16/9;"

  theme:
    default: light

  author:
    name: Raphael Pontes
    email: contato@orapha.dev

  description: "Meu Blog"
